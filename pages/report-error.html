<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SENA ASEO</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/report-error.css">
    

</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Contenido principal -->
    <div class="main-container">

        <!-- Header -->
        <div id="header-container"></div>

        <!-- Contenido del Dashboard -->

    <main class="report-container">

    <section class="report-card">

        <h1>¿Encontraste algun error?</h1>

        <p class="report-description">
            Si encontraste un problema en el sistema, descríbelo detalladamente para facilitar su revisión.
        </p>

        <form id="report-form">

            <div class="form-group">

                <label for="categoria">
                    Categoría del error
                </label>

                <select
                    id="categoria"
                    required>

                    <option value="" selected disabled>
                        Seleccione una categoría
                    </option>

                    <option value="interfaz">
                        Interfaz
                    </option>

                    <option value="inicio-sesion">
                        Inicio de sesión
                    </option>

                    <option value="turnos">
                        Turnos
                    </option>

                    <option value="reportes">
                        Reportes
                    </option>

                    <option value="otro">
                        Otro
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label for="descripcion">

                    Descripción

                </label>

                <textarea
                    id="descripcion"
                    maxlength="500"
                    placeholder="Describe detalladamente el problema..."
                    required></textarea>

                <div class="character-counter">

                    <span id="character-count">0</span>/500 caracteres

                </div>

            </div>

            <div class="report-card-footer">

                <button
                    type="submit"
                    class="enviar-report-error-button">

                    <i class="fa-solid fa-paper-plane"></i>

                    Enviar reporte

                </button>

            </div>

        </form>

    </section>

</main>


    </div>

    <div class="footer-container">
        
    </div>

    <!-- JS -->
    <script src="../js/components.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/report-error.js"></script>

</body>

</html>
